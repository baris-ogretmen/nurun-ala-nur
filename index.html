        body {
            background-color: #fdfbf7;

        }
        
        .glass-panel {
            background: rgba(253, 251, 247, 0.65);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            border: 1px solid rgba(212, 175, 55, 0.3);
            box-shadow: 0 15px 50px -10px rgba(45, 20, 69, 0.1), inset 0 0 25px rgba(255,255,255,0.6);
        }
        
        .gemini-glow {
            box-shadow: 0 0 30px rgba(126, 58, 179, 0.15), inset 0 0 20px rgba(212, 175, 55, 0.1);
            border: 1px solid rgba(126, 58, 179, 0.3);
            background: linear-gradient(135deg, rgba(255,255,255,0.8), rgba(245,243,247,0.9));
        }

        .gold-border-glow { position: relative; }
        .gold-border-glow::before {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: inherit;
            padding: 1px;
            background: linear-gradient(45deg, transparent, #d4af37, transparent);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0.4;
            transition: opacity 0.6s ease;
            pointer-events: none;
        }
        .gold-border-glow:hover::before { opacity: 1; }

        .btn-glow {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-glow:hover {
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.6), inset 0 0 12px rgba(255,255,255,0.3);
            transform: translateY(-3px);
        }

        .sacred-line { height: 1px; background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.9), transparent); }

        .chakra-dot {
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            box-shadow: 0 0 15px currentColor;
        }
        .chakra-dot:hover, .chakra-dot.active {
            transform: scale(1.8);
            box-shadow: 0 0 40px currentColor, inset 0 0 12px white;
        }

        .accordion-content {
            display: grid;
            grid-template-rows: 0fr;
            transition: grid-template-rows 0.5s ease-out;
        }
        .accordion-content.open { grid-template-rows: 1fr; }
        .accordion-inner { overflow: hidden; }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d4af37; border-radius: 10px; border: 2px solid #fdfbf7; }
        ::-webkit-scrollbar-thumb:hover { background: #b08d27; }
        
        .prose-custom p { margin-bottom: 1.2em; line-height: 1.8; }
        .prose-custom ul { list-style-type: disc; padding-left: 1.5em; margin-bottom: 1.2em; }
        .prose-custom li { margin-bottom: 0.5em; }

        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(70px);
            z-index: -1;
            pointer-events: none;
            mix-blend-mode: screen;
        }
        
        .breath-text-phase {
            animation: breathTextFade 19s linear infinite;
        }
        
        @keyframes breathTextFade {
            0%, 100% { content: "Nefes Al..."; opacity: 1; }
            21% { content: "Nefes Al..."; opacity: 0; }

            65% { content: "Nefes Ver..."; opacity: 1; }
            99% { content: "Nefes Ver..."; opacity: 0; }
        }

                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    });

                    const data = await response.json();
                    if (data.error) throw new Error(data.error.message);
                    
                    setResult(data.candidates[0].content.parts[0].text);

                    if (cleanText.includes("✨") || cleanText.match(/^[A-ZĞÜŞİÖÇ][a-zğüşiöç\s]+:/)) {
                        return <p key={idx} className={`font-semibold text-mystic-900 mt-4 mb-2 p-3 rounded-lg border ${renderStyle.headerBg} ${renderStyle.borderColor}`}>{cleanText}</p>;

                        return <div key={idx} className={`p-4 rounded-xl italic font-serif my-4 border ${renderStyle.mantraBg} ${renderStyle.borderColor}`}>{cleanText}</div>;

                        <h1 className="text-5xl md:text-8xl font-serif mb-6 tracking-tight drop-shadow-[0_0_20px_rgba(212,175,55,0.8)] text-transparent bg-clip-text bg-gradient-to-r from-gold-700 via-gold-400 to-gold-700 animate-text-shimmer py-2 leading-tight">
                            Nurun Ala Nur
                        </h1>
                        
                        <div className="flex items-center justify-center gap-4 mb-8">
                            <div className="sacred-line w-16 md:w-32"></div>
                            <h2 className="text-xl md:text-2xl font-medium text-mystic-700 tracking-widest uppercase text-center">Devasa Ruhsal Simya Merkezi</h2>
                            <div className="sacred-line w-16 md:w-32"></div>
                        </div>
                        <p className="max-w-4xl mx-auto text-mystic-800 text-lg md:text-xl font-light leading-relaxed mb-12 drop-shadow-sm">
                            Işığın ışıkla buluştuğu, Ayurveda'nın kadim sırlarıyla bedenin, zihnin ve ruhun ilksel frekansına, o saf Nura döndüğü devasa merkeze hoş geldiniz... Karanlıklarınızı aydınlatacak 20 Odalı bütüncül uyanış yolculuğu başlıyor.
                        </p>
                    </header>

                    <main className="max-w-[90rem] mx-auto px-4 sm:px-6 lg:px-8 space-y-12 z-10 relative">
                        
                        {/* Row 1: Encyclopedia & Aura Wheel */}
                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-8 items-start">
                            <Card title="Kadim Işık Ansiklopedisi (Ayurveda İlmi)" icon={<Icons.Book />}>
                                <p className="text-sm text-mystic-600 mb-6 italic">Rehberinizin şifa cephaneliğindeki nurlu ilimlerin, özellikle Ayurveda'nın derinliklerine inin...</p>
                                <Accordion data={encyclopediaData} />
                            </Card>

                            <Card title="Ruhsal Aura Çarkı" icon={<Icons.Star />}>
                                <AuraWheel />
                            </Card>
                        </div>

                        {/* Row 2: Cosmic Breath Meditation */}
                        <Card title="Kozmik Işık Nefesi (Pranayama)" icon={<Icons.Wind />}>
                            <CosmicBreathModule />
                        </Card>

                        {/* Row 3: Water Coding & Spiritual Palette */}
                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-8 items-start">
                            <Card title="Nurun Ala Nur Su Kodlama" icon={<Icons.Droplet />}>
                                <div className="flex flex-col items-center">
                                    <div className="relative w-40 h-56 mb-10 mt-4 drop-shadow-[0_15px_25px_rgba(0,0,0,0.15)]">
                                        <svg className="absolute inset-0 w-full h-full text-mystic-200/50" fill="none" stroke="currentColor" strokeWidth="1.5" viewBox="0 0 100 150">
                                            <path d="M50 5 C20 60, 5 90, 5 115 C5 140, 25 145, 50 145 C75 145, 95 140, 95 115 C95 90, 80 60, 50 5 Z" />
                                        </svg>
                                        {waterFill && (
                                            <div className="absolute inset-0 w-full h-full transition-opacity duration-1000" style={{ clipPath: 'path("M50 5 C20 60, 5 90, 5 115 C5 140, 25 145, 50 145 C75 145, 95 140, 95 115 C95 90, 80 60, 50 5 Z")' }}>
                                                <div 
                                                    key={waterFill.hz} 
                                                    className="absolute bottom-0 w-full h-full opacity-70 animate-water-fill mix-blend-multiply shadow-inner"
                                                    style={{ backgroundColor: waterFill.color }}

                                                    <div className="absolute bottom-2 left-1/4 w-2 h-2 rounded-full bg-white/50 animate-slide-up" style={{animationDuration: '2s', animationIterationCount: 'infinite'}}></div>
                                                    <div className="absolute bottom-5 right-1/3 w-3 h-3 rounded-full bg-white/40 animate-slide-up" style={{animationDuration: '3s', animationIterationCount: 'infinite', animationDelay: '1s'}}></div>
                                                    <div className="absolute top-1/2 left-1/2 w-8 h-8 -ml-4 -mt-4 bg-white/20 rounded-full blur-md animate-pulse"></div>
                                                </div>
                                            </div>
                                        )}
                                    </div>

                                    <div className="grid grid-cols-2 gap-3 w-full mb-8">
                                        {waterFrequencies.map(f => (
                                            <button 
                                                key={f.hz}
                                                onClick={() => setWaterFill(f)}
                                                className={`py-3 px-4 rounded-xl border text-sm font-medium transition-all transform hover:scale-105 btn-glow ${waterFill?.hz === f.hz ? 'border-gold-500 bg-gold-50 text-gold-900 shadow-[0_0_15px_rgba(212,175,55,0.6)] ring-2 ring-gold-200 ring-offset-2' : 'border-mystic-200 text-mystic-600 hover:bg-mystic-50 bg-white/50'}`}
                                            >
                                                {f.hz} Hz Nur
                                            </button>
                                        ))}
                                    </div>
                                    
                                    <div className="min-h-[160px] flex items-start text-center bg-white/80 p-6 rounded-2xl border border-white shadow-sm w-full">
                                        {waterFill ? 
                                            <p className="text-sm font-serif text-mystic-800 animate-fade-in leading-relaxed text-justify">"{waterFill.msg}"</p> : 
                                            <p className="text-sm text-mystic-500 w-full mt-10 italic">Suyunu kodlamak istediğin nur frekansını seç ve aydınlanmaya tanık ol...</p>
                                        }
                                    </div>
                                </div>
                            </Card>

                            <Card title="Ruhsal Palet & Sanat Nuru" icon={<Icons.Palette />}>
                                <p className="text-base text-mystic-800 text-center mb-8 font-serif italic drop-shadow-sm">"Şu an derin bir nefes al, gözlerini kapat. Işık bedenin hangi renge çekiliyor?"</p>
                                
                                <div className="flex flex-wrap justify-center gap-4 mb-8">
                                    {spiritColors.map(c => (
                                        <button 
                                            key={c.id}
                                            onClick={() => setSelectedColor(c)}
                                            className={`w-12 h-12 md:w-14 md:h-14 rounded-full shadow-lg transition-all duration-300 hover:scale-110 hover:-translate-y-2 ${selectedColor?.id === c.id ? 'ring-4 ring-gold-400 ring-offset-4 scale-110 shadow-[0_0_20px_currentColor]' : 'opacity-80 hover:opacity-100'}`}
                                            style={{ backgroundColor: c.hex }}
                                        ></button>
                                    ))}
                                </div>

                                {selectedColor ? (
                                    <div className="p-6 md:p-8 rounded-3xl bg-white/80 border border-white shadow-lg animate-fade-in space-y-6">
                                        <div className="flex items-center gap-4 border-b border-gold-200 pb-4">
                                            <span className="w-5 h-5 rounded-full shadow-inner" style={{ backgroundColor: selectedColor.hex }}></span>
                                            <h4 className="font-serif text-xl md:text-2xl text-mystic-900">{selectedColor.chakra}</h4>
                                        </div>
                                        <div className="space-y-4 text-sm md:text-base text-mystic-800 leading-relaxed text-justify">
                                            <p>{selectedColor.meaning}</p>
                                            <div className="bg-gold-50/70 p-5 rounded-2xl border border-gold-200 italic shadow-sm">
                                                {selectedColor.advice}
                                            </div>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="min-h-[250px] flex items-center justify-center border-2 border-dashed border-mystic-300 rounded-3xl bg-white/40">
                                        <p className="text-mystic-600 font-medium">Paletten nur rengini seçin...</p>
                                    </div>
                                )}
                            </Card>
                        </div>

                        <Card title="Altın Beden Haritası & Işık Bedeni Taraması" icon={<Icons.Body />} className="col-span-1">

                            <div className="flex flex-col lg:flex-row gap-12 items-start">
                                {/* SVG Silüet */}
                                <div className="relative w-full max-w-[300px] lg:max-w-[400px] mx-auto lg:mx-0 drop-shadow-[0_0_35px_rgba(212,175,55,0.4)]">
                                    <svg viewBox="0 0 200 400" className="w-full h-auto">
                                        <defs>
                                            <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                                                <stop offset="0%" stopColor="#d4af37" stopOpacity="0.9" />
                                                <stop offset="100%" stopColor="#8a6d00" stopOpacity="0.4" />
                                            </linearGradient>
                                            <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
                                                <feGaussianBlur stdDeviation="6" result="blur" />
                                                <feComposite in="SourceGraphic" in2="blur" operator="over" />
                                            </filter>
                                        </defs>
                                        <path d="M100 15 C80 15, 65 35, 65 55 C65 75, 80 85, 100 90 C120 85, 135 75, 135 55 C135 35, 120 15, 100 15 Z" fill="url(#goldGrad)" stroke="#d4af37" strokeWidth="1" filter="url(#glow)"/>

                                        <path d="M75 270 L60 430 C60 445, 80 445, 85 420 L100 310 L115 420 C120 445, 140 445, 140 430 L125 270" fill="url(#goldGrad)" stroke="#d4af37" strokeWidth="1" filter="url(#glow)"/>
                                    </svg>
                                    
                                    {/* Çakra Noktaları */}
                                    {chakrasMap.map(chk => (
                                        <div 
                                            key={chk.id}
                                            onClick={() => setSelectedChakra(chk)}
                                            className={`absolute w-6 h-6 -ml-3 -mt-3 rounded-full chakra-dot flex items-center justify-center ${selectedChakra?.id === chk.id ? 'active' : ''}`}
                                            style={{ left: chk.cx, top: chk.cy, backgroundColor: chk.color, color: chk.color, boxShadow: `0 0 25px ${chk.color}` }}
                                        >
                                            <div className="w-2 h-2 bg-white rounded-full"></div>
                                        </div>
                                    ))}
                                </div>

                                {/* Bilgi Paneli */}
                                <div className="w-full lg:flex-1">
                                    {selectedChakra ? (
                                        <div className="bg-white/80 p-8 rounded-3xl border border-gold-200 shadow-[0_10px_40px_rgba(0,0,0,0.08)] animate-fade-in h-full flex flex-col">
                                            <h4 className="font-serif text-3xl mb-6 flex items-center gap-4 pb-4 border-b border-gray-100" style={{ color: selectedChakra.color }}>
                                                <span className="w-4 h-4 rounded-full shadow-[0_0_15px_currentColor]" style={{ backgroundColor: selectedChakra.color }}></span>
                                                {selectedChakra.name}
                                            </h4>
                                            
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6 flex-grow">
                                                <div className="space-y-6">
                                                    <div>
                                                        <p className="text-xs font-bold text-gray-500 uppercase tracking-widest mb-1">Bağlı Organlar & Sistemler</p>
                                                        <p className="text-mystic-900 font-medium">{selectedChakra.organs}</p>
                                                    </div>
                                                    <div>
                                                        <p className="text-xs font-bold text-red-400 uppercase tracking-widest mb-1">Karanlık & Hastalık Gölgeleri</p>
                                                        <p className="text-mystic-800 text-sm leading-relaxed">{selectedChakra.symptoms}</p>
                                                    </div>
                                                </div>
                                                
                                                <div className="space-y-4">
                                                    <div className="bg-mystic-50 p-4 rounded-2xl border border-mystic-100 shadow-sm">
                                                        <p className="text-xs font-bold text-mystic-600 uppercase tracking-wider mb-1">EFT (Nurlanma) Noktası</p>
                                                        <p className="text-sm font-medium text-mystic-900">{selectedChakra.eft}</p>
                                                    </div>
                                                    <div className="bg-earth-50 p-4 rounded-2xl border border-earth-100 shadow-sm">
                                                        <p className="text-xs font-bold text-earth-600 uppercase tracking-wider mb-1">Işık Frekansı (Aromaterapi)</p>
                                                        <p className="text-sm font-medium text-earth-900">{selectedChakra.aroma}</p>
                                                    </div>
                                                    <div className="bg-gold-50 p-4 rounded-2xl border border-gold-200 shadow-sm">
                                                        <p className="text-xs font-bold text-gold-700 uppercase tracking-wider mb-1">Nurun Ala Nur Özel Mantrası</p>
                                                        <p className="text-base font-serif italic text-gold-900">{selectedChakra.mantra}</p>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    ) : (
                                        <div className="h-full min-h-[400px] flex items-center justify-center border-2 border-dashed border-gold-400/50 rounded-3xl bg-white/40 p-10 text-center">
                                            <div>
                                                <Icons.Body className="w-16 h-16 text-gold-500 mx-auto mb-4 opacity-80 drop-shadow-lg" />
                                                <p className="text-mystic-800 font-serif text-2xl mb-2">Işık Tapınağınızı Keşfedin</p>
                                                <p className="text-mystic-600 font-light text-lg">Soldaki altın silüet üzerinden bir nur merkezine tıklayarak aydınlanmayı başlatın.</p>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </Card>

                        {/* --- THE GRAND 20 AI MODULES RENDERED DYNAMICALLY --- */}
                        <div className="my-16">
                            <div className="flex items-center justify-center gap-4 mb-12">
                                <div className="sacred-line w-16 md:w-48"></div>
                                <h2 className="text-3xl md:text-5xl font-serif text-mystic-900 text-center drop-shadow-sm">Yapay Zeka Şifa Odaları</h2>
                                <div className="sacred-line w-16 md:w-48"></div>
                            </div>
                            <p className="text-center text-mystic-700 mb-12 max-w-3xl mx-auto font-light text-lg">Nurun Ala Nur'un bilgelik kütüphanesine hoş geldin. Dünyada eşi benzeri olmayan tam 20 farklı kozmik simya odasından ihtiyacın olanı seç ve derdini fısılda. Işık sana cevabını anında iletecektir.</p>

                            <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-8">
                                {aiModulesConfig.map(config => (
                                    <AIModule 
                                        key={config.id}
                                        {...config}
                                        apiKey={apiKey}
                                        model={model}
                                    />
                                ))}
                            </div>
                        </div>

                        {/* Calendar Widget Section */}
                        <Card title="Online Nurlanma & Randevu Paneli" icon={<Icons.Calendar />} className="col-span-1 mt-12">
                            <div className="max-w-3xl mx-auto py-4">
                                <p className="text-center text-mystic-700 mb-10 font-light leading-relaxed">
                                    Aydınlanma ve şifa yolculuğunuzda size rehberlik etmemiz için kozmik takvimden kendinize bir ışık saati ayırın. Seçtiğiniz tarih evrenin büyük tasarımında zaten sizin için ayrılmıştı.
                                </p>
                                <CalendarWidget />
                            </div>
                        </Card>
                        
                    </main>

                    <footer className="mt-32 text-center pb-12 opacity-80 relative z-10">
                        <div className="sacred-line w-64 mx-auto mb-8"></div>
                        <p className="text-2xl font-serif text-mystic-900 italic mb-4 drop-shadow-sm">"Şifa, dışarıdan alınan bir ilaç değil, içeriden hatırlanan ilksel bir nurdur."</p>
                        <p className="text-sm text-mystic-700 tracking-widest uppercase font-medium">
                            &copy; {new Date().getFullYear()} Nurun Ala Nur | Ruhsal Simya Merkezi
                        </p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
