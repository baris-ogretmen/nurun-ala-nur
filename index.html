        body {
            background-color: #fdfbf7;

        .glass-panel {
            background: rgba(253, 251, 247, 0.65);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            border: 1px solid rgba(212, 175, 55, 0.3);
            box-shadow: 0 15px 50px -10px rgba(45, 20, 69, 0.1), inset 0 0 25px rgba(255,255,255,0.6);
        }
        
        .gemini-glow {
            box-shadow: 0 0 30px rgba(126, 58, 179, 0.15), inset 0 0 20px rgba(212, 175, 55, 0.1);
            border: 1px solid rgba(126, 58, 179, 0.3);
        }

        .gold-border-glow { position: relative; }
        .gold-border-glow::before {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: inherit;
            padding: 1px;
            background: linear-gradient(45deg, transparent, #d4af37, transparent);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0.4;
            transition: opacity 0.6s ease;
            pointer-events: none;
        }
        .gold-border-glow:hover::before { opacity: 1; }

        .btn-glow {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-glow:hover {
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.6), inset 0 0 12px rgba(255,255,255,0.3);
            transform: translateY(-3px);
        }

        .sacred-line { height: 1px; background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.9), transparent); }

        .chakra-dot {
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            box-shadow: 0 0 15px currentColor;
        }
        .chakra-dot:hover, .chakra-dot.active {
            transform: scale(1.8);
            box-shadow: 0 0 40px currentColor, inset 0 0 12px white;
        }

        .accordion-content {
            display: grid;
            grid-template-rows: 0fr;
            transition: grid-template-rows 0.5s ease-out;
        }
        .accordion-content.open { grid-template-rows: 1fr; }
        .accordion-inner { overflow: hidden; }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d4af37; border-radius: 10px; border: 2px solid #fdfbf7; }
        ::-webkit-scrollbar-thumb:hover { background: #b08d27; }
        
        .prose-custom p { margin-bottom: 1.2em; line-height: 1.8; }
        .prose-custom ul { list-style-type: disc; padding-left: 1.5em; margin-bottom: 1.2em; }
        .prose-custom li { margin-bottom: 0.5em; }

        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(70px);
            z-index: -1;
            pointer-events: none;
            mix-blend-mode: screen;
        }
        
        .breath-text-phase {
            animation: breathTextFade 19s linear infinite;
        }
        
        @keyframes breathTextFade {
            0%, 100% { content: "Nefes Al..."; opacity: 1; }

            99% { content: "Nefes Ver..."; opacity: 0; }
